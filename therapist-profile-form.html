<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="assets/favicon.jpeg">
    <title>Therapist Profile Setup - SoulSupport</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .profile-setup-container {
            min-height: 100vh;
            background: var(--bg-light);
            padding-top: 100px;
            padding-bottom: 60px;
        }

        .profile-form-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-header h1 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .profile-header p {
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .profile-form-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
        }

        .photo-upload-section {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 2px solid var(--bg-light);
        }

        .photo-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 4px solid var(--primary);
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-preview i {
            font-size: 4rem;
            color: var(--text-light);
        }

        .photo-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--gradient-primary);
            color: var(--white);
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .photo-upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .photo-upload-btn input[type="file"] {
            display: none;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h3 {
            font-size: 1.3rem;
            color: var(--text-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h3 i {
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--bg-light);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--white);
            color: var(--text-dark);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkbox-item:hover {
            background: var(--primary-light);
            color: var(--white);
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .time-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-section {
            margin-top: 40px;
            text-align: center;
        }

        .submit-btn {
            padding: 16px 48px;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .submit-btn.loading .loading-spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-message,
        .error-message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .success-message {
            background: #D1FAE5;
            color: #065F46;
            border: 2px solid #10B981;
        }

        .error-message {
            background: #FEE2E2;
            color: #991B1B;
            border: 2px solid #EF4444;
        }

        .success-message.show,
        .error-message.show {
            display: flex;
        }

        @media (max-width: 768px) {
            .form-row,
            .time-range {
                grid-template-columns: 1fr;
            }

            .checkbox-group {
                grid-template-columns: 1fr;
            }

            .profile-form-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header" id="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                Soul<span>Support</span>
                <div class="logo-dot"></div>
            </a>

            <nav class="nav" id="nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="therapist-dashboard.html" class="nav-link">Dashboard</a></li>
                </ul>
                <div class="nav-buttons">
                    <button onclick="logout()" class="btn btn-primary">Logout</button>
                </div>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <div class="theme-toggle-slider">
                        <i class="fas fa-moon"></i>
                    </div>
                </button>
                <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                    <i class="fas fa-bars"></i>
                </button>
            </nav>
        </div>
    </header>

    <!-- Profile Setup Container -->
    <div class="profile-setup-container">
        <div class="profile-form-wrapper">
            <div class="profile-header">
                <h1>Complete Your Profile</h1>
                <p>Help clients find you by completing your therapist profile</p>
            </div>

            <div class="profile-form-card">
                <div class="success-message" id="success-message">
                    <i class="fas fa-check-circle"></i>
                    <span>Profile saved successfully!</span>
                </div>

                <div class="error-message" id="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text">An error occurred. Please try again.</span>
                </div>

                <form id="therapist-profile-form">
                    <!-- Photo Upload Section -->
                    <div class="photo-upload-section">
                        <div class="photo-preview" id="photo-preview">
                            <i class="fas fa-user-md"></i>
                        </div>
                        <label for="photo-input" class="photo-upload-btn">
                            <i class="fas fa-camera"></i>
                            Upload Photo
                            <input type="file" id="photo-input" accept="image/*">
                        </label>
                    </div>

                    <!-- Basic Information -->
                    <div class="form-section">
                        <h3><i class="fas fa-user"></i> Basic Information</h3>

                        <div class="form-group">
                            <label for="bio">Professional Bio</label>
                            <textarea id="bio" placeholder="Tell clients about yourself, your approach to therapy, and what makes you unique..." required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="qualifications">Qualifications</label>
                                <input type="text" id="qualifications" placeholder="e.g., PhD in Clinical Psychology" required>
                            </div>

                            <div class="form-group">
                                <label for="experience_years">Years of Experience</label>
                                <input type="number" id="experience_years" min="0" max="50" placeholder="e.g., 5" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="hourly_rate">Hourly Rate ($)</label>
                            <input type="number" id="hourly_rate" min="0" step="0.01" placeholder="e.g., 150.00" required>
                        </div>
                    </div>

                    <!-- Specializations -->
                    <div class="form-section">
                        <h3><i class="fas fa-brain"></i> Specializations</h3>
                        <div class="checkbox-group" id="specializations">
                            <label class="checkbox-item">
                                <input type="checkbox" value="Anxiety">
                                <span>Anxiety</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Depression">
                                <span>Depression</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Relationships">
                                <span>Relationships</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Stress Management">
                                <span>Stress Management</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Trauma">
                                <span>Trauma & PTSD</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Grief">
                                <span>Grief & Loss</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Self-Esteem">
                                <span>Self-Esteem</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Family Issues">
                                <span>Family Issues</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Eating Disorders">
                                <span>Eating Disorders</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Addiction">
                                <span>Addiction</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="LGBTQ+ Issues">
                                <span>LGBTQ+ Issues</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" value="Career Counseling">
                                <span>Career Counseling</span>
                            </label>
                        </div>
                    </div>

                    <!-- Availability -->
                    <div class="form-section">
                        <h3><i class="fas fa-calendar-alt"></i> Availability</h3>

                        <div class="form-group">
                            <label>Available Days</label>
                            <div class="checkbox-group" id="available-days">
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Monday">
                                    <span>Monday</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Tuesday">
                                    <span>Tuesday</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Wednesday">
                                    <span>Wednesday</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Thursday">
                                    <span>Thursday</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Friday">
                                    <span>Friday</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Saturday">
                                    <span>Saturday</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="Sunday">
                                    <span>Sunday</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Available Hours</label>
                            <div class="time-range">
                                <div>
                                    <label for="available_time_start">From</label>
                                    <input type="time" id="available_time_start" required>
                                </div>
                                <div>
                                    <label for="available_time_end">To</label>
                                    <input type="time" id="available_time_end" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="submit-section">
                        <button type="submit" class="submit-btn" id="submit-btn">
                            <span class="loading-spinner"></span>
                            <i class="fas fa-save"></i>
                            <span>Save Profile</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="supabase-client.js"></script>
    <script src="therapist-db.js"></script>

    <script>
        let uploadedPhotoUrl = null;
        let selectedPhotoFile = null;

        // Logout function
        async function logout() {
            const result = await signOutUser();
            if (result.success) {
                window.location.href = 'auth.html';
            }
        }

        // Photo preview
        document.getElementById('photo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedPhotoFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photo-preview');
                    preview.innerHTML = `<img src="${e.target.result}" alt="Profile Photo">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Load existing profile
        async function loadExistingProfile() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            const result = await getTherapistProfile(user.id);
            if (result.success && result.profile) {
                const profile = result.profile;

                // Fill in form fields
                document.getElementById('bio').value = profile.bio || '';
                document.getElementById('qualifications').value = profile.qualifications || '';
                document.getElementById('experience_years').value = profile.experience_years || 0;
                document.getElementById('hourly_rate').value = profile.hourly_rate || '';
                document.getElementById('available_time_start').value = profile.available_time_start || '';
                document.getElementById('available_time_end').value = profile.available_time_end || '';

                // Set photo if exists
                if (profile.photo_url) {
                    uploadedPhotoUrl = profile.photo_url;
                    document.getElementById('photo-preview').innerHTML = `<img src="${profile.photo_url}" alt="Profile Photo">`;
                }

                // Check specializations
                if (profile.specializations && profile.specializations.length > 0) {
                    profile.specializations.forEach(spec => {
                        const checkbox = document.querySelector(`#specializations input[value="${spec}"]`);
                        if (checkbox) checkbox.checked = true;
                    });
                }

                // Check available days
                if (profile.available_days && profile.available_days.length > 0) {
                    profile.available_days.forEach(day => {
                        const checkbox = document.querySelector(`#available-days input[value="${day}"]`);
                        if (checkbox) checkbox.checked = true;
                    });
                }
            }
        }

        // Form submission
        document.getElementById('therapist-profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const successMsg = document.getElementById('success-message');
            const errorMsg = document.getElementById('error-message');

            // Hide messages
            successMsg.classList.remove('show');
            errorMsg.classList.remove('show');

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                // Upload photo if new one selected
                if (selectedPhotoFile) {
                    const photoResult = await uploadTherapistPhoto(selectedPhotoFile);
                    if (photoResult.success) {
                        uploadedPhotoUrl = photoResult.url;
                    } else {
                        throw new Error('Failed to upload photo');
                    }
                }

                // Collect specializations
                const specializationCheckboxes = document.querySelectorAll('#specializations input:checked');
                const specializations = Array.from(specializationCheckboxes).map(cb => cb.value);

                // Collect available days
                const dayCheckboxes = document.querySelectorAll('#available-days input:checked');
                const availableDays = Array.from(dayCheckboxes).map(cb => cb.value);

                // Prepare profile data
                const profileData = {
                    bio: document.getElementById('bio').value,
                    qualifications: document.getElementById('qualifications').value,
                    experience_years: parseInt(document.getElementById('experience_years').value),
                    hourly_rate: parseFloat(document.getElementById('hourly_rate').value),
                    photo_url: uploadedPhotoUrl,
                    specializations: specializations,
                    available_days: availableDays,
                    available_time_start: document.getElementById('available_time_start').value,
                    available_time_end: document.getElementById('available_time_end').value
                };

                // Save profile
                const result = await saveTherapistProfile(profileData);

                if (result.success) {
                    successMsg.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'therapist-dashboard.html';
                    }, 2000);
                } else {
                    throw new Error(result.error || 'Failed to save profile');
                }
            } catch (error) {
                console.error('Error saving profile:', error);
                document.getElementById('error-text').textContent = error.message;
                errorMsg.classList.add('show');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', loadExistingProfile);
    </script>
</body>
</html>
